name: Dev Build and Push

on:
  push:
    branches:
      - dev

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/aladin-api:dev
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/aladin-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/aladin-api:buildcache,mode=max

      - name: Build and Push RAG API
        uses: docker/build-push-action@v5
        with:
          context: ./aladin-rag-api
          file: ./aladin-rag-api/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/aladin-rag-api:dev
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/aladin-rag-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/aladin-rag-api:buildcache,mode=max
